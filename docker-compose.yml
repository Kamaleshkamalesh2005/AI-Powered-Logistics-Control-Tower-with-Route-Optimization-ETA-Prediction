services:
  redis:
    image: redis:7-alpine
    container_name: ai-logistics-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  db:
    image: postgres:16-alpine
    container_name: ai-logistics-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: logistics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logistics"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: ai-logistics-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/logistics
      REDIS_URL: redis://redis:6379/0
      BACKEND_CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      - redis
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
    container_name: ai-logistics-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: